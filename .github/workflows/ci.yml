name: Code Syntax & Quality Check

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master", "dev" ]

permissions:
  contents: read

jobs:
  check-code:
    name: Code Syntax Verification (JDK 17)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Lightweight Compilation Dependencies
      run: |
        echo "=== Downloading minimal API jars to verify code compilation ==="
        mkdir -p libs
        # Download Jakarta EE 9.1 API (Servlet, JSP, JSON-B, etc.) - Only 2.6 MB
        wget -q -O libs/jakarta.jakartaee-api-9.1.0.jar https://repo1.maven.org/maven2/jakarta/platform/jakarta.jakartaee-api/9.1.0/jakarta.jakartaee-api-9.1.0.jar
        echo "=== Dependencies downloaded successfully ==="

    - name: Verify Code Compilation & Syntax
      run: |
        echo "=== Compiling Java Source Files to verify no syntax errors ==="
        mkdir -p build/classes
        find src/java -name "*.java" > sources.txt
        javac -cp "libs/*:web/WEB-INF/lib/*" -d build/classes -sourcepath src/java @sources.txt
        echo "=== Syntax Check Passed: Code compiled perfectly! ==="
