name: CD Pipeline - Deploy to VPS GlassFish via Docker

on:
  push:
    branches: [ "main", "master", "dev" ]

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy via Docker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Chúng ta chỉ tải GlassFish ảo ở máy chạy GitHub để phục vụ biên dịch code Java
    - name: Download GlassFish for compilation dependencies (Cloud runner only)
      run: |
        echo "=== Downloading GlassFish for build dependencies ==="
        wget -q https://github.com/eclipse-ee4j/glassfish/releases/download/6.2.5/glassfish-6.2.5.zip
        unzip -q glassfish-6.2.5.zip
        echo "=== Dependencies ready ==="

    - name: Build Web Application (WAR)
      run: |
        echo "=== Running Ant build ==="
        ant -f . -Dj2ee.server.home=$GITHUB_WORKSPACE/glassfish6/glassfish -Dlibs.CopyLibs.classpath=lib/org-netbeans-modules-java-j2seproject-copylibstask.jar clean dist
        echo "=== Build completed successfully. WAR file is ready ==="

    # Gửi các file cấu hình, file .war và database mẫu sang VPS (Cực kỳ nhẹ, chỉ mất vài giây)
    - name: Copy Deployment Files to VPS
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "dist/WebApplication3.war,Dockerfile,docker-compose.yml,sto.sql"
        target: "/home/app/sto-ecommerce/"
        strip_components: 0
        overwrite: true

    # SSH vào VPS và tự động kích hoạt Docker
    - name: SSH and Run Docker Containers on VPS
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          cd /home/app/sto-ecommerce

          echo "=== Automatically generating .env file on VPS ==="
          echo "DB_PASSWORD=${{ secrets.VPS_PASSWORD }}" > .env
          echo "SMTP_USER=${{ secrets.SMTP_USER || 'thaiandev05@gmail.com' }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS || 'gbpf hjou vvor djgf' }}" >> .env
          echo "SMTP_FROM=${{ secrets.SMTP_FROM || 'thaiandev05@gmail.com' }}" >> .env

          echo "=== Verify WAR file exists in build context ==="
          ls -la dist/WebApplication3.war

          echo "=== Stopping existing containers ==="
          docker compose down || true

          echo "=== Building Docker Image ==="
          docker build -t localhost:5000/sto-ecommerce:latest -f Dockerfile .

          echo "=== Starting Containers ==="
          docker compose up -d

          echo "=== Waiting for Payara to start ==="
          sleep 30

          echo "=== Checking container logs ==="
          docker logs sto-app --tail 100 || true

          echo "=== Verifying WAR in image ==="
          docker exec sto-app ls -la /opt/payara/deployments/ROOT.war || true

          echo "=== Testing HTTP response ==="
          docker exec sto-app curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true

          echo "=== Cleaning up old Docker images ==="
          docker image prune -f
