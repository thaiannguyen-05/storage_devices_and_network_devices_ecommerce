name: CD Pipeline - Deploy to VPS GlassFish

on:
  push:
    branches: [ "main", "master", "dev" ]

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to VPS GlassFish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download GlassFish & NetBeans CopyLibs dependencies
      run: |
        echo "=== Downloading GlassFish for build dependencies ==="
        wget -q https://github.com/eclipse-ee4j/glassfish/releases/download/6.2.5/glassfish-6.2.5.zip
        unzip -q glassfish-6.2.5.zip
        echo "=== Downloading NetBeans CopyLibs task jar ==="
        wget -q -O copylibstask.jar https://github.com/dano7/T-5-B1/raw/master/lib/org-netbeans-modules-java-j2seproject-copylibstask.jar
        echo "=== Dependencies ready ==="

    - name: Build Web Application (WAR)
      run: |
        echo "=== Running Ant build ==="
        # Pass both GlassFish server home and the downloaded CopyLibs task jar to Ant
        ant -f . -Dj2ee.server.home=$GITHUB_WORKSPACE/glassfish6/glassfish -Dlibs.CopyLibs.classpath=$GITHUB_WORKSPACE/copylibstask.jar clean dist
        echo "=== Build completed successfully. WAR file is ready ==="

    - name: Copy WAR file to VPS GlassFish autodeploy
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "dist/WebApplication3.war"
        # Adjust the target path if your GlassFish on the VPS has a different domain path
        target: "/opt/glassfish6/glassfish/domains/domain1/autodeploy/"
        strip_components: 1
        overwrite: true
