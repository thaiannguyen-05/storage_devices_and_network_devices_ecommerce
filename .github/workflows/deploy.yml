name: Build & Deploy Docker to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  APP_NAME: ecommerce
  CONTAINER_NAME: ecommerce
  APP_PORT: "8080"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Configure insecure registry for BuildKit
        run: |
          cat > /tmp/buildkitd.toml <<'EOF'
          [registry."${{ secrets.REGISTRY_HOST }}"]
            http = true
            insecure = true
          EOF

      - name: Recreate builder with insecure registry config
        run: |
          docker buildx rm builder || true
          docker buildx create \
            --name builder \
            --use \
            --driver docker-container \
            --driver-opt network=host \
            --config /tmp/buildkitd.toml
          docker buildx inspect --bootstrap

      - name: Prepare image tag
        id: meta
        run: |
          IMAGE="${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${GITHUB_SHA}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
          builder: builder

  deploy_via_ssh:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          ENV_FILE_PATH: ${{ secrets.ENV_FILE_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: IMAGE,REGISTRY_HOST,REGISTRY_USERNAME,REGISTRY_PASSWORD,CONTAINER_NAME,APP_PORT,ENV_FILE_PATH
          script_stop: true
          script: |
            set -e

            echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
            docker pull "$IMAGE"

            docker rm -f "$CONTAINER_NAME" || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$APP_PORT:8080" \
              --env-file "$ENV_FILE_PATH" \
              "$IMAGE"

            docker image prune -f
